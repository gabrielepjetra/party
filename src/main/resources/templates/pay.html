<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</head>
<body class="container-fluid p-0">
    <div class="bg-primary border border-danger border-3 rounded text-light m-4 p-2">
        <p class="my-0">De datum van vandaag is <span th:text="${today}"></span></p>
    </div>
    <div class="bg-info border border-warning border-3 rounded m-4 p-2">
        <p class="my-0">De uiterste datum van betalen is <span th:text="${futureDay}"></span></p>
    </div>
</body>
</html>
