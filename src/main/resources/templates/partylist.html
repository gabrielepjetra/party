<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: headerelement('Parties')}"></head>
<body class="container-fluid p-0 d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container mt-4 flex-grow-1">
    <h1>parties</h1>
    <p th:text="${#lists.size(parties)} + ' parties gevonden'"></p>

    <div class="row">
        <div th:each="party : ${parties}" th:object="${party}" class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 mb-3">

                <a th:href="@{/partydetails/{id}(id=*{id})}"
                   class="card border-1 m-1 p-2 text-center text-decoration-none h-100 text-body">

                    <h4 th:text="*{name}"></h4>
                    <p th:text="*{#temporals.format(date, 'dd/MM/yyyy')}"></p>
                    <img th:src="*{imageUrl}" class="img-fluid mt-auto" alt="party poster">
                </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
