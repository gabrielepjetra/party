<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Over mij</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</head>
<body class="container-fluid p-0">
<nav class="navbar navbar-expand-md navbar-dark bg-dark p-3">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse mt-3 mt-md-0" id="navbarSupportedContent">
        <a class="navbar-brand text-warning" th:href="@{/}">Let's Party!</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{venuedetails}">Zaaldetails</a>
            </li>
            <li class="nav-item active">
                <a class="nav-link" th:href="@{about}">About</a>
            </li>
        </ul>
    </div>
</nav>
<main class="row p-3 p-md-4">
    <div class="col">
        <a th:href="@{home}">Home</a>
        <h1>Over mij</h1>
        <h1>Ik ben Albanees</h1>
        <ol>
            <li th:text="${myName}"></li>
            <li th:text="${myAddress}"></li>
            <li th:text="${myCity}"></li>
            <li th:text="${myCountry}"></li>
        </ol>
        <p>Hallo ik ben <span th:text="${myName}"></span> en woon in <span th:text="${myAddress}"></span>, te <span
                th:text="${myCity}"></span></p>
    </div>
</main>
<footer class="footer fixed-bottom mt-auto py-3 border-top border-secondary-subtle border-3">
    <div class="container text-center">
        <p>&copy; Thomas More</p>
    </div>
</footer>
</body>
</html>
