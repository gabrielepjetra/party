<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zalen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/style.css}">
</head>
<body class="container-fluid p-0">
<nav class="navbar navbar-expand-md navbar-dark bg-dark p-3">
    <div class="collapse navbar-collapse">
        <a class="navbar-brand text-warning" th:href="@{/}">Let's Party!</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/venuelist}">Zalen</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/about}">Over mij</a>
            </li>
        </ul>
    </div>
</nav>

<main class="container mt-4">
    <h1 class="text-center mb-4">Zalen</h1>

    <div class="row">
        <div th:each="venue: ${venues}" th:object="${venue}"
             class="col-12 col-sm-6 col-md-4 col-lg-3 mb-3">
            <div class="card">
                <div class="card-body text-center">
                    <a th:href="@{|/venuedetails/*{id}|}" class="btn btn-primary">
                        <h3 th:text="*{venueName}"></h3>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
