<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/style.css}">
</head>
<body class="container-fluid p-0">
<nav class="navbar navbar-expand-md navbar-dark bg-dark p-3">
    <div class="collapse navbar-collapse">
        <a class="navbar-brand text-warning" th:href="@{/}">Let's Party!</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/venuedetails}">Zaaldetails</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/clientgreeting}">Client Begroeting</a>
            </li>
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/clientdetails}">Client Details</a>
            </li>
        </ul>
    </div>
</nav>

<main class="container mt-5" th:object="${client}">
    <h1 class="text-center mb-4" th:text="*{name}">Client Name</h1>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Client Informatie</h5>
                    <ul class="list-unstyled">
                        <li class="mb-2">
                            <strong>Aantal orders:</strong>
                            <span th:text="*{nrOfOrders}">0</span>
                        </li>
                        <li class="mb-2">
                            <strong>Totaal bedrag:</strong>
                            €<span th:text="*{totalAmount}">0.00</span>
                        </li>
                        <li class="mb-2">
                            <strong>Discount genomen:</strong>
                            €<span th:text="*{discountTaken}">0.00</span>
                        </li>
                    </ul>

                    <hr>

                    <h5 class="text-success">
                        <span th:text="*{name}">Vera</span>, je discount is
                        €<span th:text="${#numbers.formatDecimal(discount, 1, 2)}">0.00</span>
                    </h5>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
