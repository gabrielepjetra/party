<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: headerelement('Zaaldetails')}"></head>
<body class="container-fluid p-0 d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container mt-4 flex-grow-1" th:if="${venue}" th:object="${venue}">
        <h1 class="text-center display-3 mb-3" th:text="*{venueName}"></h1>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <a th:href="@{|/venuedetails/${prev}|}" class="btn btn-outline-primary px-3">&lt;</a>
            <h4 th:text="*{city}"></h4>
            <a th:href="@{|/venuedetails/${next}|}" class="btn btn-outline-primary px-3">&gt;</a>
        </div>

        <p class="mb-4">
            Zie <a th:href="*{linkMoreInfo}" target="_blank" class="text-primary">meer info</a>
        </p>
        <div class="row">
            <div class="col-md-6 mb-4">
                <img th:src="*{imageUrl}" th:alt="*{venueName}" class="img-fluid w-75 rounded shadow">
            </div>

            <div class="col-md-6">
                <h4 class="mb-3">Faciliteiten:</h4>
                <ul class="list-unstyled text-center">
                    <li class="mb-2">
                        max <span th:text="*{capacity}"></span> personen
                    </li>
                    <li class="mb-2">
                        <span th:text="*{distanceFromPublicTransportInKm}"></span> km van openbaar vervoer
                    </li>

                    <li class="mb-2" th:if="*{foodProvided}">
                        eten is voorzien
                    </li>

                    <li class="mb-2" th:if="*{indoor && outdoor}">
                        binnen && buiten
                    </li>
                    <li class="mb-2" th:if="*{indoor && !outdoor}">
                        binnen
                    </li>
                    <li class="mb-2" th:if="*{!indoor && outdoor}">
                        buiten
                    </li>

                    <li class="mb-2" th:if="*{freeParkingAvailable}">
                        gratis parking
                    </li>
                </ul>
                <div th:if="*{parties != null and !parties.isEmpty()}">
                    <h4 class="mb-3">parties in <span th:text="*{venueName}"></span></h4>
                    <div class="row">
                        <div class="col-3" th:each="party : *{parties}">
                            <a th:href="@{/partydetails/{id}(id=${party.id})}" class="text-decoration-none text-dark">
                                <div class="card text-center p-2">
                                    <p class="fw-bold mb-1" th:text="${party.name}"></p>
                                    <p class="mb-0 text-muted" th:text="${#temporals.format(party.date, 'dd/MM/yyyy')}"></p>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main class="container mt-4 text-center flex-grow-1" th:unless="${venue}">
        <h2 class="text-muted">Geen geldige zaal gekozen</h2>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
