<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/style.css}">
</head>
<body class="container-fluid p-0">
<nav class="navbar navbar-expand-md navbar-dark bg-dark p-3">
    <div class="collapse navbar-collapse">
        <a class="navbar-brand text-warning" th:href="@{/}">Let's Party!</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/venuedetails}">Zaaldetails</a>
            </li>
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/clienthome}">Client</a>
            </li>
        </ul>
    </div>
</nav>

<main class="container mt-5">
    <h1 class="text-center mb-5">Client Pagina's</h1>

    <div class="row justify-content-center">
        <div class="col-md-4 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Begroeting</h5>
                    <p class="card-text">Zie je persoonlijke begroeting</p>
                    <a th:href="@{/clientgreeting}" class="btn btn-primary">Ga naar begroeting</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Details</h5>
                    <p class="card-text">Bekijk je client details en discount</p>
                    <a th:href="@{/clientdetails}" class="btn btn-primary">Ga naar details</a>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
