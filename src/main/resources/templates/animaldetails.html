<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: headerelement('Animal Details')}"></head>
<body class="container-fluid p-0 d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container mt-4 flex-grow-1" th:if="${animal}" th:object="${animal}">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <a th:href="@{/animaldetails/{id}(id=${prev})}" class="btn btn-outline-secondary px-3">&lt;</a>
    <div class="text-center">
      <h1 class="display-4" th:text="*{name}"></h1>
      <h4 class="text-muted" th:text="*{city}"></h4>
    </div>
    <a th:href="@{/animaldetails/{id}(id=${next})}" class="btn btn-primary px-3">&gt;</a>
  </div>

  <div class="row">
    <div class="col-md-6">
      <p th:text="*{bio}"></p>
    </div>
  </div>

  <div class="border-top border-secondary-subtle border-2 mt-4" th:if="*{parties != null and !parties.isEmpty()}">
    <h4 class="my-3"><span th:text="*{name}"></span> gaat naar:</h4>
    <div class="row">
      <div class="col-3" th:each="party : *{parties}">
        <a th:href="@{/partydetails/{id}(id=${party.id})}" class="text-decoration-none text-dark">
          <div class="card text-center p-2">
            <p class="fw-bold mb-1" th:text="${party.name}"></p>
            <p class="mb-0 text-muted" th:text="${#temporals.format(party.date, 'dd/MM/yyyy')}"></p>
          </div>
        </a>
      </div>
    </div>
  </div>

</main>

<main class="container mt-4 flex-grow-1 text-center" th:unless="${animal}">
  <h2 class="text-danger">Geen geldig animal gekozen</h2>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
